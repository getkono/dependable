# release-plz configuration.
#
# release-plz opens a "Release" PR that bumps the version and updates the
# changelog from the Conventional Commits landed on `master` (the convco gate in
# CI + hooks keeps those well-formed). When that PR is merged, the `release` job
# tags the commit and creates the GitHub Release — which the binary and packaging
# workflows then attach assets to and publish from.
#
# crates.io publishing is disabled: dependable ships as a CLI (GitHub Releases,
# Homebrew, aqua), not as a published crate. Flip `publish` to `true` and add a
# `CARGO_REGISTRY_TOKEN` secret if the libraries are later published.

[workspace]
# Maintain changelogs for every crate, but don't tag/release/publish them
# individually — the CLI drives a single product release below.
changelog_update = true
git_tag_enable = false
git_release_enable = false
publish = false
# The release commit is created by release-plz; dependency-update churn is noise
# in a CLI's changelog.
dependencies_update = false

# The CLI is the user-facing product: one tag `v{version}` and one GitHub Release.
[[package]]
name = "dependable"
git_tag_enable = true
git_tag_name = "v{{ version }}"
git_release_enable = true
publish = false
