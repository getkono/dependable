name: Release binaries

# Build the CLI for each supported target and attach the archives (with SHA-256
# checksums) to the GitHub Release that release-plz publishes. These assets are
# what aqua downloads; Homebrew builds from source separately.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  upload-assets:
    name: ${{ matrix.target }}
    if: github.repository_owner == 'getkono'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      # Builds `dependable` for the target (cross-compiling where needed), archives
      # it as `dependable-<target>.tar.gz` (`.zip` on Windows) with a `.sha256`, and
      # uploads all three to the release. `--locked` keeps the build reproducible.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: dependable
          target: ${{ matrix.target }}
          archive: $bin-$target
          checksum: sha256
          locked: true
          token: ${{ secrets.GITHUB_TOKEN }}
